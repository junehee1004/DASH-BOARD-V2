<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>심리검사 추가제작 대시보드 (2021-2026)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;background:#F5F5F3;color:#1a1a1a;font-size:14px}
.header{background:#fff;border-bottom:1px solid #E5E5E5;padding:12px 24px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:200;flex-wrap:wrap}
.header h1{font-size:15px;font-weight:600;flex:1}
.header-btns{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:5px 12px;border-radius:7px;border:1px solid #ddd;background:#fff;color:#333;font-size:12px;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:#F5F5F3}
.btn-primary{background:#1A5FA8;color:#fff;border-color:#1A5FA8}
.btn-primary:hover{background:#155092}
.btn-green{background:#059669;color:#fff;border-color:#059669}
.btn-green:hover{background:#047857}
.tag{font-size:11px;color:#666;background:#F0F0EE;padding:2px 8px;border-radius:10px}
.container{max-width:1200px;margin:0 auto;padding:16px}
.top-row{display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:200px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fff;outline:none}
.search-box:focus{border-color:#5B9BD5;box-shadow:0 0 0 2px #EBF3FB}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
.filter-label{font-size:11px;color:#999;white-space:nowrap;font-weight:500;min-width:30px}
.chip{padding:4px 11px;border-radius:16px;border:1px solid #E0E0E0;background:#fff;color:#555;font-size:12px;cursor:pointer;transition:all .1s}
.chip.active{background:#EBF3FB;border-color:#5B9BD5;color:#1A5FA8;font-weight:500}
.chip:hover:not(.active){background:#F5F5F5}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.stat-card{background:#fff;border-radius:10px;padding:11px 14px;border:1px solid #EBEBEB}
.stat-label{font-size:10px;color:#999;margin-bottom:2px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.stat-value{font-size:22px;font-weight:600;color:#1a1a1a}
.stat-sub{font-size:11px;color:#CCC;margin-top:1px}
.table-wrap{background:#fff;border:1px solid #E5E5E5;border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{background:#FAFAF8;padding:8px 12px;text-align:left;font-weight:600;font-size:10px;color:#888;border-bottom:1px solid #EBEBEB;white-space:nowrap;text-transform:uppercase;letter-spacing:.3px}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:#1A5FA8}
.sort-icon{display:inline-block;margin-left:4px;opacity:.4;font-size:9px}
th.sort-asc .sort-icon,th.sort-desc .sort-icon{opacity:1;color:#1A5FA8}
td{padding:8px 12px;border-bottom:1px solid #F2F2F0;color:#1a1a1a;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.group-row td{background:#fff;cursor:pointer}
tr.group-row:hover td{background:#FAFDF7}
tr.comp-row td{background:#FAFAF8;font-size:12px;border-bottom:1px solid #F0F0EE}
tr.comp-row:hover td{background:#F5F5F3}
tr.sub-row td{background:#F5FFF9;font-size:11px;border-bottom:1px solid #E8F5EE;color:#1A6B3A}
tr.new-row td{background:#FFFBEB}
tr.new-row:hover td{background:#FEF3C7}
.toggle{color:#CCC;margin-right:5px;font-size:9px;display:inline-block;width:11px}
.comp-indent{padding-left:28px !important;color:#555}
.count-pill{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:15px;padding:0 5px;border-radius:7px;background:#EBF3FB;color:#1A5FA8;font-size:10px;font-weight:600;margin-left:4px;vertical-align:middle}
.alias-pill{background:#F0FFF4;color:#1A6B3A;font-size:10px;padding:1px 6px;border-radius:4px;margin-left:4px;font-weight:500;cursor:pointer;border:1px solid #BBF7D0}
.alias-pill:hover{background:#DCFCE7}
.new-badge{background:#FEF3C7;color:#92400E;font-size:10px;padding:1px 6px;border-radius:4px;margin-left:4px;font-weight:600;border:1px solid #FDE68A}
.year-dots{display:flex;gap:3px;flex-wrap:wrap}
.ydot{width:23px;height:17px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600}
.muted{color:#BBB;font-size:11px}
.pagination{display:flex;align-items:center;gap:8px;margin-top:10px;justify-content:center}
.page-btn{padding:5px 12px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#333;font-size:12px;cursor:pointer}
.page-btn:disabled{opacity:.35;cursor:not-allowed}
.page-info{font-size:12px;color:#999}
.col-test{width:38%}
.col-comp{width:10%}
.col-qty{width:12%}
.col-yr{width:27%}
.col-act{width:13%;text-align:right}
.empty-row td{padding:2rem;text-align:center;color:#BBB;font-size:13px}
/* Upload area */
.upload-area{border:2px dashed #D0D0D0;border-radius:12px;padding:24px;text-align:center;background:#FAFAFA;cursor:pointer;transition:all .15s;margin-bottom:12px}
.upload-area:hover,.upload-area.drag{border-color:#5B9BD5;background:#EBF3FB}
.upload-area .upload-icon{font-size:28px;margin-bottom:8px;color:#AAA}
.upload-area p{font-size:13px;color:#666;margin:0}
.upload-area small{font-size:11px;color:#AAA}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:14px;width:100%;max-width:640px;max-height:88vh;overflow:hidden;display:flex;flex-direction:column}
.modal-header{padding:16px 20px 12px;border-bottom:1px solid #EBEBEB;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:15px;font-weight:600}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:#AAA;padding:0 4px}
.modal-close:hover{color:#333}
.modal-body{padding:16px 20px;overflow-y:auto;flex:1}
.modal-footer{padding:12px 20px;border-top:1px solid #EBEBEB;display:flex;gap:8px;justify-content:flex-end}
.merge-section{margin-bottom:16px}
.merge-section-title{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.name-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;border:1px solid #EBEBEB;margin-bottom:5px;cursor:pointer;background:#fff;transition:all .1s}
.name-item:hover{border-color:#5B9BD5;background:#F5F9FF}
.name-item.selected{border-color:#1A5FA8;background:#EBF3FB}
.name-check{width:16px;height:16px;border-radius:4px;border:1.5px solid #D0D0D0;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px}
.name-item.selected .name-check{border-color:#1A5FA8;background:#1A5FA8;color:#fff}
.name-label{font-size:13px;color:#1a1a1a;flex:1}
.display-name-input{width:100%;padding:8px 10px;border:1px solid #ddd;border-radius:7px;font-size:13px;outline:none;margin-top:4px}
.display-name-input:focus{border-color:#5B9BD5}
.hint{font-size:11px;color:#AAA;margin-top:4px}
.edit-group-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;border:1px solid #EBEBEB;margin-bottom:5px;background:#fff}
.btn-ungroup{font-size:11px;padding:3px 8px;border:1px solid #FCA5A5;background:#FEF2F2;color:#991B1B;border-radius:5px;cursor:pointer}
.btn-ungroup:hover{background:#FEE2E2}
.btn-sm{font-size:11px;padding:3px 8px;border:1px solid #ddd;background:#fff;color:#555;border-radius:5px;cursor:pointer}
.btn-sm:hover{background:#F5F5F5}
.suggest-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:7px;border:1px solid #EBEBEB;margin-bottom:5px;background:#FAFAFA}
.suggest-names{font-size:12px;color:#555;flex:1;line-height:1.6}
.suggest-names strong{color:#1a1a1a;font-weight:500}
/* New items preview */
.new-item-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:7px;border:1px solid #FDE68A;margin-bottom:4px;background:#FFFBEB;font-size:12px}
.new-item-name{flex:1;font-weight:500;color:#92400E}
.new-item-comp{color:#666;font-size:11px}
.new-item-date{color:#AAA;font-size:11px;white-space:nowrap}
.progress-bar{height:4px;background:#E5E5E5;border-radius:2px;margin:8px 0}
.progress-fill{height:100%;background:#1A5FA8;border-radius:2px;transition:width .3s}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:8px 18px;border-radius:8px;font-size:13px;z-index:999;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:640px){.stats-grid{grid-template-columns:repeat(2,1fr)}.col-act{display:none}}
</style>
</head>
<body>
<div class="header">
  <h1>심리검사 추가제작 대시보드</h1>
  <span class="tag" id="year-tag">2021–2026</span>
  <div class="header-btns">
    <button class="btn btn-green" onclick="openUploadModal()">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><path d="M8 2v9M4 6l4-4 4 4M2 13h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      엑셀 업로드
    </button>
    <button class="btn" onclick="openMergeModal()">검사 합치기</button>
    <button class="btn" onclick="openEditModal()">그룹 편집</button>
    <button class="btn btn-primary" onclick="saveGroups()">저장 내보내기</button>
  </div>
</div>
<div class="container">
<div class="top-row">
  <input class="search-box" id="search" placeholder="검사명 또는 구성품 검색..." oninput="doSearch()">
  <div style="font-size:12px;color:#999" id="result-count"></div>
</div>
<div class="filter-row">
  <span class="filter-label">연도</span>
  <span class="chip active" data-yr="all" onclick="setYear(this)">전체</span>
  <span class="chip" data-yr="2021" onclick="setYear(this)">2021</span>
  <span class="chip" data-yr="2022" onclick="setYear(this)">2022</span>
  <span class="chip" data-yr="2023" onclick="setYear(this)">2023</span>
  <span class="chip" data-yr="2024" onclick="setYear(this)">2024</span>
  <span class="chip" data-yr="2025" onclick="setYear(this)">2025</span>
  <span class="chip" data-yr="2026" onclick="setYear(this)">2026</span>
</div>
<div class="filter-row">
  <span class="filter-label">구분</span>
  <span class="chip active" data-dv="all" onclick="setDiv(this)">전체</span>
  <span class="chip" data-dv="추가" onclick="setDiv(this)">추가</span>
  <span class="chip" data-dv="신규" onclick="setDiv(this)">신규</span>
</div>
<div class="stats-grid" id="stats"></div>
<div class="table-wrap">
<table>
<thead><tr>
  <th class="col-test sortable" id="th-name" onclick="toggleSort()">
    검사명 <span class="sort-icon" id="sort-icon">↕</span>
  </th>
  <th class="col-comp" style="text-align:center">구성품</th>
  <th class="col-qty" style="text-align:right">총 수량</th>
  <th class="col-yr">제작 연도</th>
  <th class="col-act"></th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>
<div class="pagination" id="pagination"></div>
</div>

<!-- Upload Modal -->
<div class="overlay" id="upload-overlay" style="display:none" onclick="if(event.target===this)closeUploadModal()">
<div class="modal">
  <div class="modal-header">
    <span class="modal-title">엑셀 업로드 — 신규 항목 추가</span>
    <button class="modal-close" onclick="closeUploadModal()">✕</button>
  </div>
  <div class="modal-body" id="upload-body">
    <div class="upload-area" id="drop-zone"
      ondragover="event.preventDefault();this.classList.add('drag')"
      ondragleave="this.classList.remove('drag')"
      ondrop="handleDrop(event)"
      onclick="document.getElementById('file-input').click()">
      <div class="upload-icon">📂</div>
      <p>엑셀 파일을 드래그하거나 클릭해서 선택</p>
      <small>기존 파일과 비교해 새로 추가된 항목만 불러옵니다</small>
    </div>
    <input type="file" id="file-input" accept=".xlsx,.xls" style="display:none" onchange="handleFileSelect(event)">
    <div id="upload-status"></div>
  </div>
  <div class="modal-footer" id="upload-footer">
    <button class="btn" onclick="closeUploadModal()">취소</button>
  </div>
</div>
</div>

<!-- Merge Modal -->
<div class="overlay" id="merge-overlay" style="display:none" onclick="if(event.target===this)closeMergeModal()">
<div class="modal">
  <div class="modal-header">
    <span class="modal-title">검사 합치기</span>
    <button class="modal-close" onclick="closeMergeModal()">✕</button>
  </div>
  <div class="modal-body" id="merge-body"></div>
  <div class="modal-footer">
    <button class="btn" onclick="closeMergeModal()">취소</button>
    <button class="btn btn-primary" onclick="applyMerge()">선택한 항목 합치기</button>
  </div>
</div>
</div>

<!-- Edit Modal -->
<div class="overlay" id="edit-overlay" style="display:none" onclick="if(event.target===this)closeEditModal()">
<div class="modal">
  <div class="modal-header">
    <span class="modal-title">그룹 편집</span>
    <button class="modal-close" onclick="closeEditModal()">✕</button>
  </div>
  <div class="modal-body" id="edit-body"></div>
  <div class="modal-footer">
    <button class="btn btn-primary" onclick="closeEditModal()">닫기</button>
  </div>
</div>
</div>

<div class="toast" id="toast"></div>

let userMerges = [];   // [{displayName, members:[]}]
let groups = [];
let selYear='all', selDiv='all', q='', page=0, perPage=25;
let sortDir = 1; // 1=asc, -1=desc, 0=none
const openGroups = new Set();
const openSubs = new Set();

// unique record keys already in rawData (for dedup on upload)
function buildExistingKeys(){
  const keys = new Set();
  rawData.forEach(d => {
    d.comps.forEach(c => {
      c.r.forEach(r => {
        keys.add(`${d.n}||${c.n}||${r.d}||${r.q}`);
      });
    });
  });
  return keys;
}

// ─── Build groups ─────────────────────────────────────────────────────────
function buildGroups(){
  const rawMap = {};
  rawData.forEach(d => rawMap[d.n] = d);
  const claimed = new Set();
  const result = [];

  userMerges.forEach((m, idx) => {
    const members = m.members.filter(n => rawMap[n]);
    if(!members.length) return;
    members.forEach(n => claimed.add(n));
    result.push(mergeRaws(members, m.displayName, 'u'+idx));
  });

  rawData.forEach(d => {
    if(!claimed.has(d.n)){
      result.push({id:'r_'+d.n, displayName:d.n, members:[d.n],
        comps:d.comps, y:d.y, q:d.q, isNew:d.isNew||false});
    }
  });

  result.sort((a,b) => sortDir===0 ? 0 : sortDir * a.displayName.localeCompare(b.displayName,'ko'));
  groups = result;
}

function mergeRaws(members, displayName, id){
  const rawMap = {};
  rawData.forEach(d => rawMap[d.n] = d);
  const compMap = {};
  let allY = new Set(), totalQ = 0;
  members.forEach(n => {
    const d = rawMap[n]; if(!d) return;
    d.y.forEach(y => allY.add(y));
    totalQ += d.q;
    d.comps.forEach(c => {
      if(!compMap[c.n]) compMap[c.n]={n:c.n,q:0,c:0,y:new Set(),r:[]};
      compMap[c.n].q+=c.q; compMap[c.n].c+=c.c;
      c.y.forEach(y=>compMap[c.n].y.add(y));
      compMap[c.n].r.push(...c.r);
    });
  });
  const comps = Object.values(compMap).map(c=>({...c,y:[...c.y].sort(),r:c.r.sort((a,b)=>b.d.localeCompare(a.d)).slice(0,5)}));
  return {id, displayName, members, comps, y:[...allY].sort(), q:totalQ};
}

// ─── Sort ─────────────────────────────────────────────────────────────────
function toggleSort(){
  // cycle: none(0) → asc(1) → desc(-1) → none(0)
  if(sortDir === 0) sortDir = 1;
  else if(sortDir === 1) sortDir = -1;
  else sortDir = 0;
  const icon = document.getElementById('sort-icon');
  const th = document.getElementById('th-name');
  th.classList.remove('sort-asc','sort-desc');
  if(sortDir===1){icon.textContent='↑';th.classList.add('sort-asc');}
  else if(sortDir===-1){icon.textContent='↓';th.classList.add('sort-desc');}
  else{icon.textContent='↕';}
  page=0; openGroups.clear(); openSubs.clear();
  buildGroups(); render();
}

// ─── Filter ───────────────────────────────────────────────────────────────
function filteredGroups(){
  return groups.map(g => {
    let comps = g.comps;
    if(selYear!=='all') comps = comps.filter(c=>c.y.includes(selYear));
    if(selDiv!=='all') comps = comps.filter(c=>c.r.some(r=>r.dv===selDiv));
    if(q){
      const nameOk = g.displayName.toLowerCase().includes(q)||g.members.some(m=>m.toLowerCase().includes(q));
      if(!nameOk) comps = comps.filter(c=>c.n.toLowerCase().includes(q));
      if(!nameOk && comps.length===0) return null;
    }
    if(comps.length===0) return null;
    const years = [...new Set(comps.flatMap(c=>c.y))].filter(y=>selYear==='all'||y===selYear).sort();
    if(selYear!=='all'&&years.length===0) return null;
    return {...g, comps, y:years, q:comps.reduce((s,c)=>s+c.q,0)};
  }).filter(Boolean);
}

// ─── Render ───────────────────────────────────────────────────────────────
function render(){
  const data = filteredGroups();
  const totalQty = data.reduce((s,g)=>s+g.q,0);
  const uniqueComps = new Set(data.flatMap(g=>g.comps.map(c=>c.n))).size;
  const newCount = data.filter(g=>g.isNew).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">검사 종류</div><div class="stat-value">${data.length.toLocaleString()}</div><div class="stat-sub">개${newCount?` (+${newCount} 신규)`:''}
</div></div>
    <div class="stat-card"><div class="stat-label">구성품 유형</div><div class="stat-value">${uniqueComps.toLocaleString()}</div><div class="stat-sub">개</div></div>
    <div class="stat-card"><div class="stat-label">총 제작 수량</div><div class="stat-value">${totalQty>=10000?(totalQty/10000).toFixed(1)+'만':totalQty.toLocaleString()}</div><div class="stat-sub">부/개</div></div>
    <div class="stat-card"><div class="stat-label">그룹 병합</div><div class="stat-value">${userMerges.length}</div><div class="stat-sub">개 병합됨</div></div>
  `;
  document.getElementById('result-count').textContent = `${data.length}개 검사 표시 중`;

  // Update year tag
  const allYears = [...new Set(rawData.flatMap(d=>d.y))].sort();
  if(allYears.length) document.getElementById('year-tag').textContent = allYears[0]+'–'+allYears[allYears.length-1];

  const pageData = data.slice(page*perPage, (page+1)*perPage);
  const rows = [];
  pageData.forEach((g, i) => {
    const gid = 'g'+(page*perPage+i);
    const isOpen = openGroups.has(gid);
    const isSubOpen = openSubs.has(gid);
    const ydots = g.y.map(y=>`<div class="ydot" style="background:${YBG[y]||'#EEE'};color:${YTX[y]||'#333'}">${y.slice(2)}</div>`).join('');
    const hasSubs = g.members.length>1;
    const aliasBadge = hasSubs ? `<span class="alias-pill" onclick="event.stopPropagation();toggleSub('${gid}')">${g.members.length}개 명칭${isSubOpen?'▲':'▼'}</span>` : '';
    const newBadge = g.isNew ? `<span class="new-badge">NEW</span>` : '';
    rows.push(`<tr class="group-row${g.isNew?' new-row':''}" onclick="toggleGroup('${gid}')">
      <td class="col-test"><span class="toggle">${isOpen?'▼':'▶'}</span>${g.displayName}${aliasBadge}${newBadge}</td>
      <td class="col-comp" style="text-align:center"><span class="count-pill">${g.comps.length}</span></td>
      <td class="col-qty" style="text-align:right">${g.q.toLocaleString()}</td>
      <td class="col-yr"><div class="year-dots">${ydots}</div></td>
      <td class="col-act" style="text-align:right"><button class="btn-sm" onclick="event.stopPropagation();quickEdit('${escHtml(g.id)}')">편집</button></td>
    </tr>`);
    if(hasSubs && isSubOpen){
      const tags = g.members.map(s=>`<span style="display:inline-block;background:#E8F5EE;color:#1A6B3A;font-size:11px;padding:2px 8px;border-radius:4px;margin:2px 3px 2px 0">${s}</span>`).join('');
      rows.push(`<tr class="sub-row"><td colspan="5" style="padding:7px 12px 7px 30px">${tags}</td></tr>`);
    }
    if(isOpen){
      g.comps.forEach(c => {
        const cdots = c.y.filter(y=>selYear==='all'||y===selYear).map(y=>`<div class="ydot" style="background:${YBG[y]||'#EEE'};color:${YTX[y]||'#333'}">${y.slice(2)}</div>`).join('');
        const latest = c.r[0]?c.r[0].d.slice(0,7):'';
        rows.push(`<tr class="comp-row">
          <td class="col-test comp-indent">└ ${c.n}</td>
          <td class="col-comp muted" style="text-align:center">${latest}</td>
          <td class="col-qty" style="text-align:right">${c.q.toLocaleString()}</td>
          <td class="col-yr"><div class="year-dots">${cdots}</div></td>
          <td class="col-act"></td>
        </tr>`);
      });
    }
  });
  document.getElementById('tbody').innerHTML = rows.length ? rows.join('') : `<tr class="empty-row"><td colspan="5">검색 결과가 없습니다.</td></tr>`;

  const pages = Math.ceil(data.length/perPage);
  document.getElementById('pagination').innerHTML = pages<=1?'' : `
    <button class="page-btn" onclick="goPage(${page-1})" ${page===0?'disabled':''}>← 이전</button>
    <span class="page-info">${page+1} / ${pages} 페이지</span>
    <button class="page-btn" onclick="goPage(${page+1})" ${page>=pages-1?'disabled':''}>다음 →</button>
  `;
}

function toggleGroup(gid){if(openGroups.has(gid))openGroups.delete(gid);else openGroups.add(gid);render();}
function toggleSub(gid){if(openSubs.has(gid))openSubs.delete(gid);else openSubs.add(gid);render();}
function goPage(p){page=p;openGroups.clear();openSubs.clear();window.scrollTo(0,0);render();}
function doSearch(){q=document.getElementById('search').value.toLowerCase().trim();page=0;openGroups.clear();openSubs.clear();render();}
function setYear(el){document.querySelectorAll('[data-yr]').forEach(e=>e.classList.remove('active'));el.classList.add('active');selYear=el.dataset.yr;page=0;openGroups.clear();openSubs.clear();render();}
function setDiv(el){document.querySelectorAll('[data-dv]').forEach(e=>e.classList.remove('active'));el.classList.add('active');selDiv=el.dataset.dv;page=0;openGroups.clear();openSubs.clear();render();}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ─── Upload ───────────────────────────────────────────────────────────────
function openUploadModal(){
  document.getElementById('upload-status').innerHTML='';
  document.getElementById('upload-footer').innerHTML=`<button class="btn" onclick="closeUploadModal()">취소</button>`;
  document.getElementById('upload-overlay').style.display='flex';
}
function closeUploadModal(){document.getElementById('upload-overlay').style.display='none';}

function handleDrop(e){
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if(file) processFile(file);
}
function handleFileSelect(e){
  const file = e.target.files[0];
  if(file) processFile(file);
  e.target.value='';
}

function parseExcelDate(v){
  if(!v) return '';
  if(v instanceof Date) return v.toISOString().slice(0,10);
  if(typeof v === 'number'){
    // Excel serial date
    const d = new Date(Math.round((v - 25569)*86400*1000));
    return d.toISOString().slice(0,10);
  }
  if(typeof v === 'string'){
    const m = v.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
    if(m) return `${m[1]}-${m[2].padStart(2,'0')}-${m[3].padStart(2,'0')}`;
  }
  return String(v).slice(0,10);
}

function processFile(file){
  const status = document.getElementById('upload-status');
  status.innerHTML = `<div style="padding:12px;text-align:center;color:#888;font-size:13px">파일 읽는 중...</div>
    <div class="progress-bar"><div class="progress-fill" style="width:30%"></div></div>`;

  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const wb = XLSX.read(e.target.result, {type:'array', cellDates:false});
      status.innerHTML = `<div class="progress-bar"><div class="progress-fill" style="width:60%"></div></div>`;

      const existingKeys = buildExistingKeys();
      const newRecords = []; // {testName, compName, qty, date, division, year}

      // Determine which sheets to parse — any sheet name containing a year >= 2021
      const targetSheets = wb.SheetNames.filter(s => {
        const m = s.match(/(\d{4})/);
        return m && parseInt(m[1]) >= 2021;
      });

      targetSheets.forEach(sheetName => {
        const ws = wb.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
        const yearMatch = sheetName.match(/(\d{4})/);
        const sheetYear = yearMatch ? yearMatch[1] : '';

        // Find header row (row with '검사명')
        let headerIdx = -1;
        for(let i=0;i<Math.min(rows.length,5);i++){
          if(rows[i].some(c=>String(c).includes('검사명'))){headerIdx=i;break;}
        }
        if(headerIdx<0) return;

        const headers = rows[headerIdx].map(h=>String(h).trim());
        const col = name => headers.findIndex(h=>h.includes(name));
        const cTest=col('검사명'), cComp=col('구성품'), cQty=col('수량'), cDate=col('제작의뢰일'), cDiv=col('구분');
        if(cTest<0||cComp<0) return;

        let lastTest = '';
        for(let i=headerIdx+1;i<rows.length;i++){
          const row = rows[i];
          const rawTest = String(row[cTest]||'').trim();
          const testName = rawTest||lastTest;
          if(rawTest) lastTest = rawTest;
          const compName = String(row[cComp]||'').trim();
          if(!testName||!compName) continue;

          const qtyRaw = row[cQty];
          const qty = qtyRaw!==''?parseInt(qtyRaw)||0:0;
          const dateStr = parseExcelDate(cDate>=0?row[cDate]:'');
          const division = cDiv>=0?String(row[cDiv]||'').trim():'추가';
          const year = dateStr?dateStr.slice(0,4):sheetYear;

          const key = `${testName}||${compName}||${dateStr}||${qty}`;
          if(!existingKeys.has(key)){
            newRecords.push({testName, compName, qty, date:dateStr, division, year});
          }
        }
      });

      status.innerHTML = `<div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div>`;
      renderUploadPreview(newRecords);
    } catch(err){
      status.innerHTML = `<div style="padding:12px;color:#991B1B;font-size:13px;background:#FEF2F2;border-radius:8px">파일을 읽을 수 없습니다: ${err.message}</div>`;
    }
  };
  reader.readAsArrayBuffer(file);
}

function renderUploadPreview(records){
  const status = document.getElementById('upload-status');
  const footer = document.getElementById('upload-footer');

  if(records.length===0){
    status.innerHTML = `<div style="padding:16px;text-align:center;background:#F0FFF4;border-radius:10px;color:#065F46;font-size:13px">
      새로 추가된 항목이 없습니다.<br><span style="font-size:11px;color:#AAA;margin-top:4px;display:block">기존 데이터와 동일하거나 이미 반영된 파일입니다.</span>
    </div>`;
    footer.innerHTML = `<button class="btn btn-primary" onclick="closeUploadModal()">확인</button>`;
    return;
  }

  // Group by test name for display
  const byTest = {};
  records.forEach(r=>{
    if(!byTest[r.testName]) byTest[r.testName]=[];
    byTest[r.testName].push(r);
  });
  const testCount = Object.keys(byTest).length;
  const compCount = records.length;

  let html = `<div style="padding:10px 0 12px;font-size:13px;color:#065F46;font-weight:500">
    ${testCount}개 검사 / ${compCount}건의 새 항목을 발견했습니다
  </div>
  <div style="max-height:280px;overflow-y:auto">`;
  Object.entries(byTest).slice(0,40).forEach(([name, recs])=>{
    html += `<div class="new-item-row">
      <div class="new-item-name">${name}</div>
      <div class="new-item-comp">${[...new Set(recs.map(r=>r.compName))].join(', ')}</div>
      <div class="new-item-date">${recs[0].date||recs[0].year}</div>
    </div>`;
  });
  if(Object.keys(byTest).length>40) html+=`<div style="text-align:center;color:#AAA;font-size:11px;padding:8px">...외 ${Object.keys(byTest).length-40}개 검사</div>`;
  html += '</div>';
  status.innerHTML = html;

  footer.innerHTML = `
    <button class="btn" onclick="closeUploadModal()">취소</button>
    <button class="btn btn-green" onclick="applyUpload(${escHtml(JSON.stringify(records))})">
      ${compCount}건 추가하기
    </button>`;
}

function applyUpload(records){
  // Merge records into rawData
  const rawMap = {};
  rawData.forEach(d => rawMap[d.n] = d);

  const addedTests = new Set();
  records.forEach(r=>{
    if(!rawMap[r.testName]){
      rawMap[r.testName] = {n:r.testName, comps:[], y:[], q:0, c:0, isNew:true};
      rawData.push(rawMap[r.testName]);
    }
    const td = rawMap[r.testName];
    td.isNew = true;
    addedTests.add(r.testName);

    let comp = td.comps.find(c=>c.n===r.compName);
    if(!comp){
      comp = {n:r.compName, q:0, c:0, y:[], r:[]};
      td.comps.push(comp);
    }
    comp.q += r.qty; comp.c++;
    if(r.year && !comp.y.includes(r.year)) comp.y.push(r.year);
    comp.r.unshift({y:r.year, q:r.qty, d:r.date, dv:r.division});
    comp.r = comp.r.slice(0,10);
    td.q += r.qty; td.c++;
    if(r.year && !td.y.includes(r.year)) td.y.push(r.year);

    // Add year chip if new
    const yearChips = document.querySelector('.filter-row');
    if(r.year && !document.querySelector(`[data-yr="${r.year}"]`)){
      const chip = document.createElement('span');
      chip.className='chip'; chip.dataset.yr=r.year;
      chip.textContent=r.year; chip.onclick=function(){setYear(this);};
      yearChips.appendChild(chip);
    }
  });

  buildGroups(); render();
  closeUploadModal();
  showToast(`${records.length}건 추가됨 (${addedTests.size}개 검사)`);
}

// ─── Merge Modal ──────────────────────────────────────────────────────────
let mergeSelected = new Set();
function openMergeModal(){mergeSelected.clear();renderMergeBody('');document.getElementById('merge-overlay').style.display='flex';}
function closeMergeModal(){document.getElementById('merge-overlay').style.display='none';}

function renderMergeBody(sq){
  const allNames = rawData.map(d=>d.n).sort((a,b)=>a.localeCompare(b,'ko'));
  const filtered = sq ? allNames.filter(n=>n.toLowerCase().includes(sq.toLowerCase())) : allNames;

  let suggestHtml = '';
  if(!sq){
    const entries = Object.entries(CANDIDATES).slice(0,6);
    if(entries.length){
      suggestHtml=`<div class="merge-section"><div class="merge-section-title">유사 검사명 후보</div>`;
      entries.forEach(([p,names])=>{
        const preview = names.slice(0,3).map(n=>`<strong>${n}</strong>`).join(', ')+(names.length>3?` 외 ${names.length-3}개`:'');
        suggestHtml+=`<div class="suggest-item"><div class="suggest-names">${preview}</div><button class="btn-sm" onclick="selectCandidates(${JSON.stringify(names).replace(/"/g,'&quot;')})">선택</button></div>`;
      });
      suggestHtml+='</div>';
    }
  }

  const listHtml=`<div class="merge-section">
    <div class="merge-section-title"><span>검사 선택 <span style="font-weight:400;color:#AAA">(${mergeSelected.size}개)</span></span>
    ${mergeSelected.size>0?`<button class="btn-sm" onclick="mergeSelected.clear();renderMergeBody(document.getElementById('merge-search').value)">초기화</button>`:''}
    </div>
    <input class="display-name-input" id="merge-search" placeholder="검색..." style="margin-bottom:8px" oninput="renderMergeBody(this.value)" value="${escHtml(sq)}">
    <div style="max-height:240px;overflow-y:auto">
    ${filtered.slice(0,80).map(n=>{
      const sel=mergeSelected.has(n);
      return `<div class="name-item ${sel?'selected':''}" onclick="toggleMergeSel('${escHtml(n)}')"><div class="name-check">${sel?'✓':''}</div><div class="name-label">${n}</div></div>`;
    }).join('')}
    ${filtered.length>80?`<div style="text-align:center;font-size:11px;color:#AAA;padding:6px">${filtered.length-80}개 더 있음 — 검색으로 좁혀주세요</div>`:''}
    </div>
  </div>`;

  const displayHtml = mergeSelected.size>=2?`<div class="merge-section">
    <div class="merge-section-title">표시 이름</div>
    <input class="display-name-input" id="merge-display-name" placeholder="합쳐진 검사의 표시 이름..." value="${escHtml([...mergeSelected][0]||'')}">
    <div class="hint">비워두면 첫 번째 항목 이름을 사용합니다.</div>
  </div>` : '';

  document.getElementById('merge-body').innerHTML = suggestHtml+listHtml+displayHtml;
}

function toggleMergeSel(name){
  if(mergeSelected.has(name)) mergeSelected.delete(name); else mergeSelected.add(name);
  renderMergeBody(document.getElementById('merge-search')?.value||'');
}
function selectCandidates(names){names.forEach(n=>mergeSelected.add(n));renderMergeBody('');}
function applyMerge(){
  if(mergeSelected.size<2){showToast('2개 이상 선택해주세요');return;}
  const inp = document.getElementById('merge-display-name');
  const displayName = (inp?.value||'').trim()||[...mergeSelected].sort((a,b)=>a.length-b.length)[0];
  userMerges.push({displayName, members:[...mergeSelected]});
  buildGroups(); render(); closeMergeModal();
  showToast(`${mergeSelected.size}개 → "${displayName}"으로 합쳤습니다`);
  mergeSelected.clear();
}

// ─── Edit Modal ───────────────────────────────────────────────────────────
function openEditModal(){renderEditBody();document.getElementById('edit-overlay').style.display='flex';}
function closeEditModal(){document.getElementById('edit-overlay').style.display='none';}
function renderEditBody(){
  if(!userMerges.length){
    document.getElementById('edit-body').innerHTML=`<div style="text-align:center;color:#AAA;padding:2rem;font-size:13px">아직 합친 그룹이 없습니다.</div>`;
    return;
  }
  document.getElementById('edit-body').innerHTML = userMerges.map((m,i)=>`
    <div class="edit-group-item">
      <div style="flex:1"><div style="font-size:13px;font-weight:500;margin-bottom:3px">${m.displayName}</div>
      <div style="font-size:11px;color:#888;line-height:1.6">${m.members.join(' · ')}</div></div>
      <button class="btn-sm" onclick="renameGroup(${i})">이름 수정</button>
      <button class="btn-ungroup" onclick="ungroupMerge(${i})">해제</button>
    </div>`).join('');
}
function ungroupMerge(i){const m=userMerges[i];userMerges.splice(i,1);buildGroups();render();renderEditBody();showToast(`"${m.displayName}" 그룹 해제`);}
function renameGroup(i){
  const newName=prompt('새 표시 이름:',userMerges[i].displayName);
  if(newName&&newName.trim()){userMerges[i].displayName=newName.trim();buildGroups();render();renderEditBody();showToast('이름 수정 완료');}
}
function quickEdit(groupId){
  const g=groups.find(x=>x.id===groupId);
  if(!g) return;
  if(g.members.length===1){openMergeModal();setTimeout(()=>toggleMergeSel(g.members[0]),50);}
  else openEditModal();
}

// ─── Save ─────────────────────────────────────────────────────────────────
function saveGroups(){
  const blob=new Blob([JSON.stringify({merges:userMerges,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='검사_그룹_설정.json';a.click();
  URL.revokeObjectURL(url);showToast('설정 저장 완료');
}

// ─── Toast ────────────────────────────────────────────────────────────────
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ─── Init ─────────────────────────────────────────────────────────────────
buildGroups();
render();
</script>
